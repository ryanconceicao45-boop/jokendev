<!DOCTYPE html>
<html lang="pt-br">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="./assets/style/body.css">
    <link rel="stylesheet" href="./assets/style/resp.css">
    <link rel="icon" href="./assets/img/logo.png">
    <title>JokenDev</title>
</head>

<body>
    <section class="Load-tela">
        <img src="./assets/img/logo.png" alt="LogoDev">
        <div>
            <p>CARREGANDO RECURSOS...</p>
            <div class="load-barra-t">
                <div class="load-barra">
                </div>
            </div>
        </div>
    </section>
    <section class="tela-home">
        <div class="box-infos">
            <img src="./assets/img/logo.png" alt="LogoDev">
            <p class="text-infos"></p>
            <button class="btn-iniciar">INICIAR</button>
        </div>
    </section>
    <section class="bg-main">
        <div class="bg-main-segs">
            <div class="box-main-user">
                <div class="box-status-user">
                    <img src="./assets/img/avatar1.jpg" alt="Avatar-user">
                    <div>
                        <p>Você<br>Sua pontuação: <span class="pontos-user">0</span></p>
                    </div>
                </div>
                <div class="box-funcions">
                    <!-- Aqui vai entra as funcoes -->
                    <p>Qual será sua escolha?</p>
                    <div class="box-escolhas-elm">
                        <img src="./assets/img/pedra.png" alt="pedra">
                        |
                        <img src="./assets/img/papel.png" alt="papel">
                        |
                        <img src="./assets/img/tesoura.png" alt="tesoura">
                    </div>
                </div>
            </div>
            <div class="center-partida-stat">
                <img class="img-partida" src="./assets/img/logo.png" alt="logo-meio">
            </div>
            <div class="box-main-machine">
                <div class="box-status-machine">
                    <img src="./assets/img/avatar2.jpg" alt="Avatar-user">
                    <div>
                        <p>Você<br>Pontuação da maquina: <span class="pontos-machine">0</span></p>
                    </div>
                </div>
                <div class="box-funcions">
                    <p>Seu oponente aguarda sua decisão.</p>
                </div>
            </div>
        </div>
    </section>
</body>
<script type="module" src="./assets/src/script.js"></script>

</html>
